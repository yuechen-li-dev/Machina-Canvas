<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-label="MachinaCanvas demo poster scene graph">
  <defs>
    <mask id="mask-generated-product-image" maskUnits="userSpaceOnUse">
      <image href="assets/generated-product-alpha.svg" x="508" y="176" width="224" height="308" preserveAspectRatio="xMidYMid meet" />
    </mask>
  </defs>
  <rect data-canvas-object-id="poster-bg" data-canvas-kind="rect" data-canvas-name="Poster background" x="0" y="0" width="960" height="640" fill="#f4f4f1" stroke="#d7d7d2" />

  <ellipse data-canvas-object-id="product-base-shadow" data-canvas-kind="ellipse" data-canvas-name="Product base shadow" cx="625" cy="504" rx="125" ry="22" fill="#d8d8d4" />
  <image data-canvas-object-id="generated-product-image" data-canvas-kind="image" data-canvas-name="Generated product image" href="assets/generated-product.svg" x="508" y="176" width="224" height="308" preserveAspectRatio="xMidYMid meet" opacity="1" mask="url(#mask-generated-product-image)" />
  <g class="canvas-sketch-overlay" data-canvas-object-id="generated-product-sketch" data-canvas-kind="sketchOverlay" data-canvas-name="Generated product sketch overlay">
    <rect class="canvas-sketch-box" data-canvas-sketch-id="silhouette-box" x="480" y="160" width="320" height="480" fill="rgba(35, 100, 210, 0.08)" stroke="#2364d2" pointer-events="none" />
    <line class="canvas-sketch-line" data-canvas-sketch-id="highlight-callout" x1="640" y1="400" x2="640" y2="160" stroke="#2364d2" pointer-events="none" />
    <circle class="canvas-sketch-point" data-canvas-sketch-id="focus-point" cx="560" cy="400" r="5" fill="#ffffff" stroke="#2364d2" pointer-events="none" />
    <text class="canvas-sketch-label" data-canvas-sketch-id="main-note" x="560" y="160" pointer-events="none">Generated product silhouette</text>
  </g>
  <rect data-canvas-object-id="product-silhouette-body" data-canvas-kind="rect" data-canvas-name="Product silhouette body" x="520" y="200" width="190" height="284" rx="34" fill="#151515" stroke="#000000" />
  <ellipse data-canvas-object-id="product-highlight" data-canvas-kind="ellipse" data-canvas-name="Product highlight" cx="596" cy="323" rx="31" ry="85" fill="#ffffff" opacity="0.92" />

  <text data-canvas-object-id="logo" data-canvas-kind="text" data-canvas-name="CODEX wordmark" x="72" y="94" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750">CODEX</text>
  <text data-canvas-object-id="headline" data-canvas-kind="text" data-canvas-name="Hero headline" x="70" y="170" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="680">
    <tspan x="70">Inspectable geometry</tspan>
    <tspan x="70" dy="40.32">for AI-native design.</tspan>
  </text>
  <rect data-canvas-object-id="price-chip" data-canvas-kind="rect" data-canvas-name="Price chip" x="707" y="154" width="112" height="38" rx="19" fill="#ffffff" stroke="#111111" />
  <text x="732" y="179" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">M30c</text>

  <rect data-canvas-object-id="cta-bg" data-canvas-kind="rect" data-canvas-name="CTA button background" x="72" y="390" width="188" height="48" rx="2" fill="#111111" />
  <text data-canvas-object-id="cta-label" data-canvas-kind="text" data-canvas-name="CTA button label" x="96" y="420" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Inspect scene</text>

  <rect data-canvas-object-id="feature-chip-1" data-canvas-kind="rect" data-canvas-name="Feature chip: IDs" x="72" y="500" width="138" height="34" rx="17" fill="#ffffff" stroke="#cfcfca" />
  <text x="104" y="522" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Stable IDs</text>
  <rect data-canvas-object-id="feature-chip-2" data-canvas-kind="rect" data-canvas-name="Feature chip: Bounds" x="224" y="500" width="158" height="34" rx="17" fill="#ffffff" stroke="#cfcfca" />
  <text x="258" y="522" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Bounds</text>
  <rect data-canvas-object-id="feature-chip-3" data-canvas-kind="rect" data-canvas-name="Feature chip: Commands" x="398" y="500" width="182" height="34" rx="17" fill="#ffffff" stroke="#cfcfca" />
  <text x="432" y="522" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Commands</text>
</svg>
