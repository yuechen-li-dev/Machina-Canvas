name = "Align hero text and distribute chips"
description = "Example command recipe for LLM-assisted geometric edits."

[[command]]
kind = "align"
axis = "left"
ids = ["logo", "headline"]

[[command]]
kind = "moveToGrid"
id = "feature-chip-1"
ref = "B4.c"
anchor = "center"

[[command]]
kind = "attachAlphaMap"
source_id = "generated-product-image"
alpha_id = "generated-product-alpha"

[[command]]
kind = "setSketchOverlayVisible"
overlay_id = "generated-product-sketch"
visible = true

[[command]]
kind = "setFrame"
id = "cta-bg"

[command.frame]
kind = "anchor"
left = 72
top = 390
width = 188
height = 48

[[command]]
kind = "move"
id = "cta-bg"
dx = 0
dy = 16

[[command]]
kind = "move"
id = "cta-label"
dx = 0
dy = 16

[[command]]
kind = "distribute"
axis = "horizontal"
ids = ["feature-chip-1", "feature-chip-2", "feature-chip-3"]
gap = 16
