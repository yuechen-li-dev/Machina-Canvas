schema_version = 1
name = "Demo Poster"
created_by = "MachinaCanvas"
source_app = "apps/machina-canvas"

render_svg = "render.svg"
document_json = "document.json"

[selected]
object_id = "headline"

[viewport]
zoom = 4
center_x = 260
center_y = 192
focus_kind = "gridRef"
focus_value = "B2"

[unit_system]
unit = "px"
label = "px"
units_per_inch = 96
pixels_per_unit = 1
precision = 0

[reference_grid]
columns = 6
rows = 4
columns_label = "A-F"
rows_label = "1-4"

[summary]
text = "Demo Poster is 960x640px with 15 objects across 3 layers. Generated product image uses alpha map generated-product-alpha and sketch overlay generated-product-sketch for deterministic visual reasoning handoff."

[validation]
ok = true
diagnostics = 1

[[diagnostic]]
severity = "info"
code = "SelectedObject"
object_id = "headline"
message = "Selected object is Hero headline."

[[composite]]
kind = "alphaMapFor"
source_id = "generated-product-image"
alpha_id = "generated-product-alpha"

[[sketch_overlay]]
source_id = "generated-product-image"
overlay_id = "generated-product-sketch"
path = "objects/generated-product-sketch.sketch.toml"
